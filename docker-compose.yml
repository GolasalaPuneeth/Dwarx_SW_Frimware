services:

  web:
    build: ./app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app 
    env_file:
      - .env
    depends_on:
      - db


  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata/:/var/lib/postgresql/data

volumes:
  postgres_data: